# DEV secrets – for local / CI use only.
# Never commit real credentials. Replace placeholders or use a secret manager.
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secrets
  namespace: auth-dev
type: Opaque
stringData:
  DB_USER: "authuser"
  DB_PASSWORD: "devpass"
  JWT_PRIVATE_KEY: "${JWT_PRIVATE_KEY_DEV}"
  JWT_PUBLIC_KEY: "${JWT_PUBLIC_KEY_DEV}"
  SSL_KEYSTORE_PASSWORD: "changeit"
