# UAT secrets – inject via CI/CD pipeline or a secret manager (e.g. Vault, AWS SSM).
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secrets
  namespace: auth-uat
type: Opaque
stringData:
  DB_USER: "${DB_USER_UAT}"
  DB_PASSWORD: "${DB_PASSWORD_UAT}"
  JWT_PRIVATE_KEY: "${JWT_PRIVATE_KEY_UAT}"
  JWT_PUBLIC_KEY: "${JWT_PUBLIC_KEY_UAT}"
  SSL_KEYSTORE_PASSWORD: "${SSL_KEYSTORE_PASSWORD_UAT}"
