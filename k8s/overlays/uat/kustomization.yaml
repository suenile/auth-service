apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: auth-uat

bases:
  - ../../base

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - ingress.yaml

patches:
  - path: replicas-patch.yaml

images:
  - name: auth-service
    newTag: uat-latest

commonLabels:
  environment: uat
