# PROD secrets – NEVER commit real values.
# Populate via your secret manager (HashiCorp Vault, AWS Secrets Manager, etc.)
# or via CI/CD environment-variable substitution before applying.
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secrets
  namespace: auth-prod
type: Opaque
stringData:
  DB_USER: "${DB_USER_PROD}"
  DB_PASSWORD: "${DB_PASSWORD_PROD}"
  JWT_PRIVATE_KEY: "${JWT_PRIVATE_KEY_PROD}"
  JWT_PUBLIC_KEY: "${JWT_PUBLIC_KEY_PROD}"
  SSL_KEYSTORE_PASSWORD: "${SSL_KEYSTORE_PASSWORD_PROD}"
