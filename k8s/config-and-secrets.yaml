apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: default
data:
  DB_URL: "jdbc:postgresql://postgres-service:5432/authdb"
  CORS_ALLOWED_ORIGINS: "https://app.example.com"
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secrets
  namespace: default
type: Opaque
# Values must be base64 encoded: echo -n 'value' | base64
stringData:
  DB_USER: "authuser"
  DB_PASSWORD: "CHANGE_ME"
  JWT_PRIVATE_KEY: "CHANGE_ME_BASE64_PRIVATE_KEY"
  JWT_PUBLIC_KEY: "CHANGE_ME_BASE64_PUBLIC_KEY"
  SSL_KEYSTORE_PASSWORD: "CHANGE_ME"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service-sa
  namespace: default
