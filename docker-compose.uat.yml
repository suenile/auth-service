# UAT overlay
# TLS enabled (port 8443), near-production settings, staging Let's Encrypt cert.
# Usage: docker compose -f docker-compose.yml -f docker-compose.uat.yml up --build

version: "3.9"

services:
  postgres:
    environment:
      POSTGRES_DB: authdb_uat
      POSTGRES_USER: ${DB_USER_UAT:?DB_USER_UAT not set}
      POSTGRES_PASSWORD: ${DB_PASSWORD_UAT:?DB_PASSWORD_UAT not set}
    ports:
      - "5432:5432"

  auth-service:
    ports:
      - "8443:8443"
    environment:
      SPRING_PROFILES_ACTIVE: uat
      DB_URL: jdbc:postgresql://postgres:5432/authdb_uat
      DB_USER: ${DB_USER_UAT}
      DB_PASSWORD: ${DB_PASSWORD_UAT}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY_UAT:?JWT_PRIVATE_KEY_UAT not set}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY_UAT:?JWT_PUBLIC_KEY_UAT not set}
      SSL_KEYSTORE_PASSWORD: ${SSL_KEYSTORE_PASSWORD_UAT:?SSL_KEYSTORE_PASSWORD_UAT not set}
      CORS_ALLOWED_ORIGINS: "https://uat.example.com"
