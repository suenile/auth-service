# ==============================================================================
# UAT profile
# Usage: SPRING_PROFILES_ACTIVE=uat
# Shared pre-production environment for QA / acceptance testing.
# TLS enabled; Flyway validates the schema (no auto-DDL).
# Moderate logging; rate limits tighter than dev but looser than prod.
# ==============================================================================

server:
  port: 8443
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-password: ${SSL_KEYSTORE_PASSWORD:changeit}
    key-store-type: PKCS12
    key-alias: auth-service
  servlet:
    context-path: /

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://uat-postgres:5432/authdb_uat}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

jwt:
  issuer: auth-service-uat
  access-token-expiration: 900    # 15 minutes

security:
  rate-limit:
    capacity: 50
    refill-tokens: 50
    refill-duration-seconds: 60
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://uat.example.com}

management:
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.authservice: INFO
    org.springframework.security: WARN
