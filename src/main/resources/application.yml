# ==============================================================================
# Base configuration – shared across ALL environments.
# Environment-specific overrides live in application-{dev,uat,prod}.yml
# Active profile is selected via: SPRING_PROFILES_ACTIVE=dev|uat|prod
# ==============================================================================

spring:
  application:
    name: auth-service

  # Profile auto-detection: default to 'dev' when nothing is set
  profiles:
    default: dev

  # --- Datasource (overridden per env) ---
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/authdb}
    username: ${DB_USER:authuser}
    password: ${DB_PASSWORD:authpass}
    hikari:
      connection-timeout: 30000

  # --- JPA ---
  jpa:
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  # --- Flyway ---
  flyway:
    enabled: true
    locations: classpath:db/migration

  # --- Mail ---
  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@example.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # --- Cache ---
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=15m

# --- JWT (secrets injected via env vars) ---
jwt:
  private-key: ${JWT_PRIVATE_KEY}
  public-key: ${JWT_PUBLIC_KEY}
  access-token-expiration: 900       # 15 minutes in seconds
  refresh-token-expiration: 604800   # 7 days in seconds
  issuer: auth-service

# --- Security defaults ---
security:
  rate-limit:
    capacity: 10
    refill-tokens: 10
    refill-duration-seconds: 60
  account-lockout:
    max-attempts: 5
    lockout-duration-minutes: 15
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://localhost:3000}

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
